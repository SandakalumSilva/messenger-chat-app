<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Messenger UI</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap 5 CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <style>
            body {
                background-color: #f0f2f5;
            }

            .chat-container {
                height: 100vh;
            }

            .chat-sidebar {
                background: #fff;
                border-right: 1px solid #ddd;
                height: 100%;
                overflow-y: auto;
            }

            .chat-messages {
                height: calc(100vh - 140px);
                overflow-y: auto;
                padding: 20px;
                background-color: #f0f2f5;
            }

            .message {
                max-width: 60%;
                padding: 10px 15px;
                border-radius: 20px;
                margin-bottom: 10px;
            }

            .sent {
                background-color: #0084ff;
                color: white;
                margin-left: auto;
                border-bottom-right-radius: 5px;
            }

            .received {
                background-color: #e4e6eb;
                color: black;
                border-bottom-left-radius: 5px;
            }

            .chat-input {
                background: #fff;
                padding: 15px;
                border-top: 1px solid #ddd;
            }

            .contact:hover {
                background-color: #f5f5f5;
                cursor: pointer;
            }

            .active-contact {
                background-color: #e7f3ff;
            }
        </style>
    </head>

    <body>
        <div class="container-fluid chat-container">
            <div class="row h-100">
                <!-- Sidebar -->
                <div class="col-md-4 col-lg-3 chat-sidebar p-0">
                    <div class="p-3 border-bottom">
                        <h5 class="mb-0">Chats</h5>
                    </div>

                    <div class="list-group list-group-flush">
                        <div class="list-group-item contact active-contact">
                            <div class="d-flex align-items-center">
                                <img
                                    src="https://i.pravatar.cc/40?img=1"
                                    class="rounded-circle me-3"
                                />
                                <div>
                                    <strong>Harvey Specter</strong>
                                    <div class="text-muted small">
                                        You take the gun...
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="list-group-item contact">
                            <div class="d-flex align-items-center">
                                <img
                                    src="https://i.pravatar.cc/40?img=2"
                                    class="rounded-circle me-3"
                                />
                                <div>
                                    <strong>Louis Litt</strong>
                                    <div class="text-muted small">
                                        You just got LITT up.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Chat Content -->
                <div class="col-md-8 col-lg-9 d-flex flex-column p-0">
                    <!-- Chat Header -->
                    <div
                        class="p-3 bg-white border-bottom d-flex align-items-center"
                    >
                        <img
                            src="https://i.pravatar.cc/40?img=1"
                            class="rounded-circle me-3"
                        />
                        <strong>Harvey Specter</strong>
                    </div>

                    <!-- Messages -->
                    <div class="chat-messages flex-grow-1">
                        <div class="message received">
                            When you're backed against the wall, break it down.
                        </div>

                        <div class="message sent">
                            Oh yeah? Did Michael Jordan tell you that?
                        </div>

                        <div class="message received">No. I told him that.</div>
                    </div>

                    <!-- Input -->
                    <div class="chat-input">
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control rounded-pill"
                                placeholder="Type a message..."
                            />
                            <button class="btn btn-primary rounded-pill ms-2">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
